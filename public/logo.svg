<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Star polygon -->
    <polygon id="star" points="0,-4 1.17,-1.2 4.2,-1.2 1.74,0.6 2.68,3.5 0,1.7 -2.68,3.5 -1.74,0.6 -4.2,-1.2 -1.17,-1.2" fill="#017a39" />
  </defs>

  <g transform="translate(100, 95)">
    <!-- Outer borders -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#017a39" stroke-width="2" />
    <circle cx="0" cy="0" r="75" fill="none" stroke="#017a39" stroke-width="5" />
    <circle cx="0" cy="0" r="69" fill="none" stroke="#017a39" stroke-width="1.5" />
    
    <!-- Stars arch -->
    <use href="#star" x="-45" y="-18" transform="rotate(-40 -45 -18) scale(1.4)" />
    <use href="#star" x="-28" y="-38" transform="rotate(-20 -28 -38) scale(1.4)" />
    <use href="#star" x="-9" y="-48" transform="scale(1.4)" />
    <use href="#star" x="9" y="-48" transform="scale(1.4)" />
    <use href="#star" x="28" y="-38" transform="rotate(20 28 -38) scale(1.4)" />
    <use href="#star" x="45" y="-18" transform="rotate(40 45 -18) scale(1.4)" />
    
    <!-- Leaves Base -->
    <path d="M 0,45 C -30,0 -20,-40 0,-50 C 20,-40 30,0 0,45 Z" fill="#017a39" />
    
    <path d="M -12,45 C -60,30 -75,-10 -55,-20 C -35,0 -18,10 -12,45 Z" fill="#017a39" />
    <path d="M -12,45 C -32,30 -42,15 -55,-5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" />
    
    <path d="M 12,45 C 60,30 75,-10 55,-20 C 35,0 18,10 12,45 Z" fill="#017a39" />
    <path d="M 12,45 C 32,30 42,15 55,-5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" />
    
    <path d="M 0,45 C 0,15 0,-15 0,-35" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Bottom Text Badge -->
  <g transform="translate(100, 175)">
    <rect x="-85" y="-16" width="170" height="32" rx="16" fill="#ffffff" />
    <rect x="-85" y="-16" width="170" height="32" rx="16" fill="none" stroke="#017a39" stroke-width="2" />
    <rect x="-80" y="-11" width="160" height="22" rx="11" fill="none" stroke="#017a39" stroke-width="4" />
    <text x="0" y="6" font-family="Arial Black, Impact, sans-serif" font-size="16" font-weight="900" fill="black" text-anchor="middle" letter-spacing="1">GREEN HEALTH</text>
  </g>
</svg>
